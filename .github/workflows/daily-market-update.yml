name: Daily Market Data Refresh

on:
  schedule:
    - cron: "30 13 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install yfinance pandas

      - run: python scripts/update_market_cache.py

      - run: |
          git config user.name "ZenzerJs"
          git config user.email "12345678+JaydenSaha@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "market: $(date +%Y-%m-%d) update"
          git push
